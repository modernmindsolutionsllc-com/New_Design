    <meta name="theme-color" content="#F7F9FF" />
    <script>
      (function () {
        var themeKey = 'modernmind-theme'
        var storedTheme = localStorage.getItem(themeKey)
        var preferredTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
        var theme = storedTheme === 'dark' || storedTheme === 'light' ? storedTheme : preferredTheme
        var themeColor = theme === 'dark' ? '#0F1B34' : '#F7F9FF'

        document.documentElement.dataset.theme = theme
        document.documentElement.style.colorScheme = theme

        var metaTheme = document.querySelector('meta[name="theme-color"]')
        if (metaTheme) {
          metaTheme.setAttribute('content', themeColor)
        }
      })()
    </script>
