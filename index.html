<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary Meta ── -->
    <title>YourAgency — Software Development Studio</title>
    <meta name="description"
      content="We build custom web apps, mobile apps, and AI solutions for startups and growing businesses. Clean code, honest communication, and on-time delivery." />
    <meta name="keywords"
      content="software development, web app development, mobile app development, React, Flutter, custom software, India" />
    <meta name="author" content="YourAgency" />
    <meta name="robots" content="index, follow" />

    <!-- ── Open Graph (social sharing) ── -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://youragency.com/" />
    <meta property="og:title"       content="YourAgency — Software Development Studio" />
    <meta property="og:description" content="Custom web apps, mobile apps, and AI solutions for businesses that deserve better than average." />
    <meta property="og:image"       content="/og-image.png" />

    <!-- ── Twitter Card ── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="YourAgency — Software Development Studio" />
    <meta name="twitter:description" content="Custom software for startups and growing businesses." />
    <meta name="twitter:image"       content="/og-image.png" />

    <!-- ── Favicon ── -->
    <link rel="icon"             type="image/svg+xml" href="/favicon.ico" />
    <link rel="apple-touch-icon"                      href="/apple-touch-icon.png" />

    <!-- ── Google Fonts — Playfair Display + DM Sans ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap"
      rel="stylesheet"
    />

    <!-- ── Theme colour for mobile browsers ── -->
    <meta name="theme-color" content="#F5F4F0" />
    <script>
      (function () {
        var themeKey = 'youragency-theme';
        var storedTheme = localStorage.getItem(themeKey);
        var preferredTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        var theme = storedTheme === 'dark' || storedTheme === 'light' ? storedTheme : preferredTheme;
        var themeColor = theme === 'dark' ? '#111827' : '#F5F4F0';

        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;

        var metaTheme = document.querySelector('meta[name="theme-color"]');
        if (metaTheme) {
          metaTheme.setAttribute('content', themeColor);
        }
      })();
    </script>

    <!-- ── Canonical URL ── -->
    <link rel="canonical" href="https://youragency.com/" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
